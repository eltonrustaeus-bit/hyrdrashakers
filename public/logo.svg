<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- White background circle -->
  <circle cx="100" cy="100" r="99" fill="white"/>
  <circle cx="100" cy="100" r="97" stroke="#1e3a8a" stroke-width="1.5" fill="none"/>

  <!-- Shared body base where all necks merge -->
  <ellipse cx="100" cy="118" rx="18" ry="8" fill="#1e3a8a"/>

  <!-- Left neck path -->
  <path d="
    M 88 120
    C 83 108, 70 94, 58 78
    C 48 64, 46 52, 52 44
    C 56 38, 64 37, 71 41
    C 78 45, 79 54, 75 65
    C 72 73, 78 88, 92 116
    Z
  " fill="#1e3a8a"/>
  <!-- Left head -->
  <ellipse cx="57" cy="45" rx="9" ry="11" fill="#1e3a8a" transform="rotate(-35 57 45)"/>

  <!-- Center neck path -->
  <path d="
    M 91 120
    C 90 100, 90 75, 92 52
    L 108 52
    C 110 75, 110 100, 109 120
    Z
  " fill="#1e3a8a"/>
  <!-- Center head -->
  <ellipse cx="100" cy="44" rx="9" ry="12" fill="#1e3a8a"/>

  <!-- Right neck path (mirror of left) -->
  <path d="
    M 112 120
    C 117 108, 130 94, 142 78
    C 152 64, 154 52, 148 44
    C 144 38, 136 37, 129 41
    C 122 45, 121 54, 125 65
    C 128 73, 122 88, 108 116
    Z
  " fill="#1e3a8a"/>
  <!-- Right head (mirror of left) -->
  <ellipse cx="143" cy="45" rx="9" ry="11" fill="#1e3a8a" transform="rotate(35 143 45)"/>

  <!-- Horizon wave line -->
  <path d="M 52 126 Q 76 120 100 123 Q 124 126 148 122"
    stroke="#1e3a8a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- HYDRA text -->
  <text
    x="100" y="146"
    text-anchor="middle"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="23"
    fill="#1e3a8a"
    letter-spacing="5">HYDRA</text>

  <!-- — Shakers — -->
  <text
    x="100" y="162"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="11"
    fill="#1e3a8a"
    letter-spacing="2">&#x2014; Shakers &#x2014;</text>
</svg>
